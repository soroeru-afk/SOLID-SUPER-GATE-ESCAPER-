<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLID SUPER GATE ESCAPER</title>
  <link rel="manifest" href="/SOLID-SUPER-GATE-ESCAPER-/manifest.json">
  <link rel="apple-touch-icon" href="/SOLID-SUPER-GATE-ESCAPER-/icon-192.png">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/SOLID-SUPER-GATE-ESCAPER-/sw.js?v=4')
          .then((reg) => {
            console.log('ServiceWorker registered successfully: ', reg.scope);
          })
          .catch((err) => {
            console.error('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
